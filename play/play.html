<!doctype html>
<html>
  <head>
    <title>Play</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="play.css" />
  </head>
  <body>
    <div id="game">
      <div id="hp">HP: 100</div>
      <div id="caught">Pokémon Caught: 0</div>
      <div id="level">Level: 1</div>
      <div id="wave">Wave: 1/3</div>

      <div id="trainer">
        <img src="" alt="" id="player" />
        <div id="hpProgress"></div>
      </div>
      <div id="typingOverlay" class="typing-overlay"></div>
    </div>
    <div id="levelCompleteModal" class="modal" style="display: none">
      <div class="modal-content">
        <h2>Level <span id="completedLevel"></span> Finished!</h2>
        <p>Great job! You've completed the level.</p>
        <button id="continueBtn">Continue to Next Level</button>
        <button id="stopBtn">Stop and Go Home</button>
      </div>
    </div>
    <div id="gameOverModal" class="modal" style="display: none">
      <div class="modal-content">
        <h2>Game Over</h2>
        <p>You ran out of HP! Try again?</p>
        <button id="tryAgainBtn">Try Again</button>
      </div>
    </div>
    <a href="/about.html" id="helpButton" class="help-button">?</a>
    <script src="script.js"></script>
  </body>
</html>
