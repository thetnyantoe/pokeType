<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PokeDex</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="icon" type="image/png" href="../assets/images/pokeball.png" />
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
      }

      .container {
        width: 90%;
        max-width: 1200px;
        margin: 0 auto;
        text-align: center;
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        margin-bottom: 1rem;
      }

      input {
        display: block;
        margin: 20px auto;
        padding: 8px;
        width: 250px;
      }

      .pokemon-card {
        width: 200px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        cursor: pointer;
        position: relative;
        overflow: hidden;
        padding: 20px;
        transition: transform 0.2s ease;
      }

      .pokemon-card:hover {
        transform: translateY(-5px);
      }

      .pokemon-card img {
        width: 100px;
        height: 100px;
      }

      .pokemon-id {
        position: absolute;
        top: 10px;
        right: 10px;
        background: gray;
        color: white;
        padding: 5px 10px;
        border-radius: 20px;
        font-size: 14px;
      }

      .pokemon-name {
        font-size: 20px;
        font-weight: bold;
        margin-top: 10px;
        text-transform: capitalize;
      }
      #pokeball {
        width: 35px;
        height: 35px;
        margin-left: 10px;
        cursor: pointer;
      }
      #pokeball:hover {
        transform: rotate(45deg);
        width: 36px;
        height: 36px;
        transition-duration: 0.2s;
      }

      .pagination {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        margin: 24px 0 40px;
      }

      .pagination button {
        border: 1px solid rgba(0, 0, 0, 0.12);
        border-radius: 8px;
        background: #fff;
        color: #333;
        padding: 8px 12px;
        cursor: pointer;
        min-width: 40px;
      }

      .pagination button.active {
        background: #333;
        color: #fff;
        border-color: #333;
      }

      .pagination button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
    </style>
  </head>

  <body>
    <div id="navbar"></div>
    <div
      style="
        margin-top: 100px;
        display: flex;
        align-items: center;
        justify-content: center;
        justify-items: center;
      "
    >
      <div>
        <input
          type="text"
          id="searchInput"
          placeholder="Type pokemon's name..."
          style="border-radius: 20px; border: none; padding: 10px"
        />
      </div>

      <img src="../assets/images/pokeball.png" alt="" id="pokeball" />
    </div>
    <div class="container">
      <div id="loading" style="font-size: 18px; margin: 30px 0; color: #555">
        Loading...
      </div>
      <div class="row"></div>
      <div id="pagination" class="pagination"></div>
    </div>

    <script src="all.js"></script>
    <script src="../js/main.js"></script>
  </body>
</html>
